# ConjunApp — Compose base
# Uso: docker compose up --build
# Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

name: conjunapp

services:
  db:
    image: postgres:16-alpine
    container_name: conjunapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-conjunapp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - conjunapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-conjunapp}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  back:
    build:
      context: ./conjunapp-back
      dockerfile: Dockerfile
      target: development
    container_name: conjunapp-back
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-ConjunApp API}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:root@db:5432/conjunapp}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:5174}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      ALLOW_ADMIN_REGISTER: ${ALLOW_ADMIN_REGISTER:-true}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - conjunapp-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  admin:
    build:
      context: ./conjunapp-admin
      dockerfile: Dockerfile
      target: development
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: conjunapp-admin
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "5173:5173"
    depends_on:
      back:
        condition: service_healthy
    networks:
      - conjunapp-net

  # App de residentes (Flutter Web) — probar en navegador sin emulador/móvil
  resident:
    build:
      context: ./conjunapp-app
      dockerfile: Dockerfile.web
      args:
        API_BASE_URL: ${RESIDENT_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: conjunapp-resident
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      back:
        condition: service_healthy
    networks:
      - conjunapp-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  conjunapp-net:
    name: conjunapp-net
    driver: bridge

volumes:
  pgdata:
    name: conjunapp-pgdata
