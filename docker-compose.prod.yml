# Overrides de producción
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  db:
    ports: !override []

  back:
    build:
      target: production
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOW_ADMIN_REGISTER: ${ALLOW_ADMIN_REGISTER:-false}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-false}
    restart: always

  admin:
    build:
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports: !override
      - "8080:80"
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/ >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  resident:
    restart: always
    ports: !override
      - "5174:80"
